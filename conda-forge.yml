azure:
  free_disk_space: true
provider:
  osx_arm64: default
  linux_aarch64: default
conda_build:
  pkg_format: '2'
conda_build_tool: rattler-build
conda_forge_output_validation: true
conda_install_tool: pixi
github:
  branch_name: main
  tooling_branch_name: main
shellcheck:
  enabled: true
remote_ci_setup:
  - rattler-build !=0.62.2
  - conda-build
  - conda-forge-ci-setup
