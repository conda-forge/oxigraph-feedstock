# -*- mode: toml -*-
# This file was generated automatically from conda-smithy. To update this configuration,
# update the conda-forge.yml and/or the recipe/meta.yaml.
"$schema" = "https://pixi.sh/v0.59.0/schema/manifest/schema.json"

[workspace]
name = "oxigraph-feedstock"
version = "3.55.1"  # conda-smithy version used to generate this file
description = "Pixi configuration for conda-forge/oxigraph-feedstock"
authors = ["@conda-forge/oxigraph"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "win-64"]
requires-pixi = ">=0.59.0"

[dependencies]
conda-build = ">=24.1"
conda-forge-ci-setup = "4.*"
rattler-build = "*"

[tasks.inspect-all]
cmd = "inspect_artifacts --all-packages"
description = "List contents of all packages found in rattler-build build directory."
[tasks.build]
cmd = "rattler-build build --recipe recipe"
description = "Build oxigraph-feedstock directly (without setup scripts), no particular variant specified"
[tasks."build-linux_64_is_python_minfalse"]
cmd = "rattler-build build --recipe recipe -m .ci_support/linux_64_is_python_minfalse.yaml"
description = "Build oxigraph-feedstock with variant linux_64_is_python_minfalse directly (without setup scripts)"
[tasks."inspect-linux_64_is_python_minfalse"]
cmd = "inspect_artifacts --recipe-dir recipe -m .ci_support/linux_64_is_python_minfalse.yaml"
description = "List contents of oxigraph-feedstock packages built for variant linux_64_is_python_minfalse"
[tasks."build-linux_64_is_python_mintrue"]
cmd = "rattler-build build --recipe recipe -m .ci_support/linux_64_is_python_mintrue.yaml"
description = "Build oxigraph-feedstock with variant linux_64_is_python_mintrue directly (without setup scripts)"
[tasks."inspect-linux_64_is_python_mintrue"]
